name: Release RenderKit

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Package
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    outputs:
      version: ${{ steps.build.outputs.VERSION }}
      nupkg_path: ${{ steps.build.outputs.NUPKG_PATH }}
      nupkg_name: ${{ steps.build.outputs.NUPKG_NAME }}
      stage_path: ${{ steps.build.outputs.STAGE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@main
        with:
          dotnet-version: '8.0.x'

      - name: Execute Build
        id: build
        run: |
          $result = & ./build/Build-RenderKitPackage.ps1 -RepositoryRoot $env:GITHUB_WORKSPACE

          "VERSION=$($result.Version)"                          >> $env:GITHUB_OUTPUT
          "NUPKG_PATH=$($result.PackagePath)"                   >> $env:GITHUB_OUTPUT
          "NUPKG_NAME=$(Split-Path $result.PackagePath -Leaf)"  >> $env:GITHUB_OUTPUT
          "STAGE_PATH=$($result.StagePath)"                     >> $env:GITHUB_OUTPUT

      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@main
        with:
          name: RenderKit-${{ steps.build.outputs.VERSION }}-nupkg
          path: ${{ steps.build.outputs.NUPKG_PATH }}
          if-no-files-found: error

      - name: Upload staged module artifact
        uses: actions/upload-artifact@main
        with:
          name: RenderKit-${{ steps.build.outputs.VERSION }}-stage
          path: ${{ steps.build.outputs.STAGE_PATH }}
          if-no-files-found: error

          package-compatibility:
      name: Validate supported installers
      needs: build
      runs-on: windows-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Download .nupkg artifact
          uses: actions/download-artifact@v4
          with:
            name: RenderKit-${{ needs.build.outputs.version }}-nupkg
            path: ./artifacts

        - name: Validate PSResourceGet installation
          shell: pwsh
          run: |
            $package = Get-Item ./artifacts/*.nupkg
            ./build/Test-RenderKitLocalInstall.ps1 `
              -PackagePath $package.FullName `
              -Version '${{ needs.build.outputs.version }}' `
              -PackageManager PSResourceGet

        - name: Install PowerShellGet 2.2.5
          shell: powershell
          run: |
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
            Install-Module -Name PowerShellGet -RequiredVersion 2.2.5 -Scope CurrentUser -Force -AllowClobber

        - name: Validate PowerShellGet installation
          shell: powershell
          run: |
            Import-Module PowerShellGet -RequiredVersion 2.2.5 -Force
            $package = Get-Item ./artifacts/*.nupkg
            ./build/Test-RenderKitLocalInstall.ps1 `
              -PackagePath $package.FullName `
              -Version '${{ needs.build.outputs.version }}' `
              -PackageManager PowerShellGet

  github-release:
    name: GitHub Release
    needs: build
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Download .nupkg artifact
        uses: actions/download-artifact@main
        with:
          name: RenderKit-${{ needs.build.outputs.version }}-nupkg
          path: ./artifacts

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ needs.build.outputs.version }}"
          gh release view $tag --repo ${{ github.repository }} 2>&1 | Out-Null
          if ($LASTEXITCODE -eq 0) {
            "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            "EXISTS=false" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag    = "v${{ needs.build.outputs.version }}"
          $nupkg  = "./artifacts/${{ needs.build.outputs.nupkg_name }}"
          $commit = "${{ github.sha }}"
          $short  = $commit.Substring(0, 7)
          $date   = Get-Date -Format 'yyyy-MM-dd HH:mm'

          $notes = @"
          ## RenderKit $tag

          - **Commit:** ``$short``
          - **Date:** $date
          - **Branch:** main
          "@

          gh release create $tag $nupkg `
            --repo ${{ github.repository }} `
            --target $commit `
            --title "RenderKit $tag" `
            --notes $notes

      - name: Update existing release
        if: steps.check.outputs.EXISTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag   = "v${{ needs.build.outputs.version }}"
          $nupkg = "./artifacts/${{ needs.build.outputs.nupkg_name }}"
          $name  = "${{ needs.build.outputs.nupkg_name }}"

          gh release delete-asset $tag $name --yes --repo ${{ github.repository }} 2>$null
          gh release upload $tag $nupkg --clobber --repo ${{ github.repository }}

  github-packages:
    name: Publish to GitHub Packages
    needs: build
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Download .nupkg artifact
        uses: actions/download-artifact@main
        with:
          name: RenderKit-${{ needs.build.outputs.version }}-nupkg
          path: ./artifacts

      - name: Push to GitHub Packages
        run: |
          $nupkg = "./artifacts/${{ needs.build.outputs.nupkg_name }}"

          dotnet nuget push $nupkg `
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" `
            --api-key ${{ secrets.GITHUB_TOKEN }} `
            --skip-duplicate

  psgallery:
    name: Publish to PowerShell Gallery
    needs: [build, github-release, package-compatibility]
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Download staged module
        uses: actions/download-artifact@main
        with:
          name: RenderKit-${{ needs.build.outputs.version }}-stage
          path: ./stage

      - name: Ensure PSResourceGet and PSGallery are available
        run: |
          Import-Module Microsoft.PowerShell.PSResourceGet -Force

          # Repository-Store-Verzeichnis anlegen, falls nicht vorhanden
          $storePath = Join-Path $env:LOCALAPPDATA 'PSResourceGet'
          if (-not (Test-Path $storePath)) {
              New-Item -Path $storePath -ItemType Directory -Force | Out-Null
          }

          # PSGallery registrieren (idempotent)
          if (-not (Get-PSResourceRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
              Register-PSResourceRepository -PSGallery -Trusted
          }

          Get-PSResourceRepository -Name PSGallery

      - name: Publish to PSGallery
        env:
          NUGETAPIKEY: ${{ secrets.NUGETAPIKEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGETAPIKEY)) {
              throw 'Missing repository secret NUGETAPIKEY.'
          }

          $manifest = Get-ChildItem -Path ./stage -Filter RenderKit.psd1 -File -Recurse
          if (@($manifest).Count -ne 1) {
              throw "Expected exactly one staged RenderKit manifest, found $(@($manifest).Count)."
          }

          Publish-PSResource `
            -Path $manifest.Directory.FullName `
            -Repository PSGallery `
            -ApiKey $env:NUGETAPIKEY

  gallery-validation:
    name: Validate PSGallery installation
    needs: [build, psgallery]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate with PSResourceGet
        shell: pwsh
        run: |
          ./build/Test-RenderKitGalleryInstall.ps1 `
            -Version '${{ needs.build.outputs.version }}' `
            -PackageManager PSResourceGet

      - name: Install PowerShellGet 2.2.5
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force
          Install-Module -Name PowerShellGet -RequiredVersion 2.2.5 -Scope CurrentUser -Force -AllowClobber

      - name: Validate with PowerShellGet 2.2.5
        shell: powershell
        run: |
          Import-Module PowerShellGet -RequiredVersion 2.2.5 -Force
          ./build/Test-RenderKitGalleryInstall.ps1 `
            -Version '${{ needs.build.outputs.version }}' `
            -PackageManager PowerShellGet
