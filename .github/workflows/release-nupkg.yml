name: Build & Release RenderKit

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ausführen
        id: build
        shell: pwsh
        run: |
          $result = & ./build/Build-Module.ps1 -RepositoryRoot $env:GITHUB_WORKSPACE

          "VERSION=$($result.Version)"       >> $env:GITHUB_OUTPUT
          "NUPKG_PATH=$($result.PackagePath)" >> $env:GITHUB_OUTPUT
          "NUPKG_NAME=$(Split-Path $result.PackagePath -Leaf)" >> $env:GITHUB_OUTPUT

      - name: Prüfen ob Release bereits existiert
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.build.outputs.VERSION }}"
          $existing = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            "EXISTS=false" >> $env:GITHUB_OUTPUT
          }

      - name: GitHub Release erstellen
        if: steps.check.outputs.EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag     = "v${{ steps.build.outputs.VERSION }}"
          $nupkg   = "${{ steps.build.outputs.NUPKG_PATH }}"
          $commit  = "${{ github.sha }}"
          $short   = $commit.Substring(0, 7)
          $date    = Get-Date -Format 'yyyy-MM-dd HH:mm'

          $notes = @"
          ## RenderKit $tag

          - **Commit:** ``$short``
          - **Datum:** $date
          - **Branch:** main
          "@

          gh release create $tag $nupkg `
            --target $commit `
            --title "RenderKit $tag" `
            --notes $notes

      - name: Bestehendes Release aktualisieren
        if: steps.check.outputs.EXISTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag   = "v${{ steps.build.outputs.VERSION }}"
          $nupkg = "${{ steps.build.outputs.NUPKG_PATH }}"
          $name  = "${{ steps.build.outputs.NUPKG_NAME }}"

          # Altes Asset entfernen, neues hochladen
          gh release delete-asset $tag $name --yes 2>$null
          gh release upload $tag $nupkg --clobber