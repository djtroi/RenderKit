name: Cross-Platform Storage

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

permissions:
  contents: read

jobs:
  storage-tests:
    name: Storage / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force

      - name: Run storage tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $result = Invoke-Pester `
            -Path ./Tests/Storage/RenderKit.StorageService.Tests.ps1 `
            -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) storage test(s) failed."
          }

  windows-powershell-5:
    name: Storage / Windows PowerShell 5.1
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Install Pester
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force

      - name: Run storage tests
        shell: powershell
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $result = Invoke-Pester `
            -Path ./Tests/Storage/RenderKit.StorageService.Tests.ps1 `
            -PassThru
          if ($result.FailedCount -gt 0) {
              throw "$($result.FailedCount) storage test(s) failed."
          }
